name: Build and Deploy to OpenShift via Terraform

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Log in to GitHub Container Registry
      uses: docker/login-action@v2
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Set lowercase image tag
      run: |
        IMAGE_TAG=$(echo "ghcr.io/${{ github.repository }}/django-backend:${{ github.sha }}" | tr '[:upper:]' '[:lower:]')
        echo "IMAGE_TAG=$IMAGE_TAG" >> $GITHUB_ENV

    - name: Build and push Docker image
      run: |
        docker build -t ${{ env.IMAGE_TAG }} .
        docker push ${{ env.IMAGE_TAG }}

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v2

    - name: Terraform Init
      working-directory: ./terraform
      run: terraform init

    - name: Terraform Apply
      working-directory: ./terraform
      env:
        TF_VAR_openshift_server_url: ${{ secrets.OPENSHIFT_SERVER_URL }}
        TF_VAR_openshift_token: ${{ secrets.OPENSHIFT_TOKEN }}
        TF_VAR_namespace: ${{ secrets.OPENSHIFT_NAMESPACE }}
        
        TF_VAR_docker_image_tag: ghcr.io/${{ github.repository }}/django-backend:${{ github.sha }}
        
        TF_VAR_django_secret_key: ${{ secrets.DJANGO_SECRET_KEY }}
        TF_VAR_db_name: ${{ secrets.DB_NAME }}
        TF_VAR_db_user: ${{ secrets.DB_USER }}
        TF_VAR_db_password: ${{ secrets.DB_PASSWORD }}
        
        TF_VAR_github_username: ${{ secrets.GHCR_USERNAME }}
        TF_VAR_github_token: ${{ secrets.GHCR_PAT }}
      run: terraform apply -auto-approve