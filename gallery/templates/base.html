<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PhotoLife | Ossza meg pillanatait</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #aee1ff;
        }
        .nav-blur {
            backdrop-filter: blur(12px);
            background-color: rgba(255, 255, 255, 0.8);
        }
        .gradient-text {
            background: linear-gradient(90deg, #4f46e5, #9333ea);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col">

    <nav class="nav-blur sticky top-0 z-50 border-b border-gray-200">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16 items-center">
                
                <div class="flex-shrink-0 flex items-center">
                    <a href="{% url 'photo_list' %}" class="text-2xl font-bold gradient-text tracking-tight">
                        <i class="fa-solid fa-camera-retro mr-2"></i>PhotoLife
                    </a>
                </div>

                <div class="hidden md:flex items-center space-x-8">
                    <a href="{% url 'photo_list' %}" class="text-gray-600 hover:text-indigo-600 font-medium transition-colors">Főoldal</a>
                    
                    {% if user.is_authenticated %}
                        <div class="flex items-center space-x-4 border-l pl-8 border-gray-200">
                            <span class="text-gray-500 text-sm">Üdv, <span class="font-semibold text-gray-800">{{ user.username }}</span>!</span>
                            <a href="{% url 'photo_upload' %}" class="bg-indigo-600 hover:bg-indigo-700 text-white px-4 py-2 rounded-lg text-sm font-semibold shadow-sm transition-all transform hover:scale-105">
                                <i class="fa-solid fa-cloud-arrow-up mr-2"></i>Feltöltés
                            </a>
                            <form action="{% url 'logout' %}" method="post" class="inline">
                                {% csrf_token %}
                                <button type="submit" class="text-gray-500 hover:text-red-500 transition-colors">
                                    <i class="fa-solid fa-right-from-bracket"></i>
                                </button>
                            </form>
                        </div>
                    {% else %}
                        <div class="flex items-center space-x-4">
                            <a href="{% url 'login' %}" class="text-gray-600 hover:text-indigo-600 font-medium">Belépés</a>
                            <a href="{% url 'register' %}" class="bg-gray-900 hover:bg-black text-white px-5 py-2 rounded-lg text-sm font-semibold transition-all">
                                Regisztráció
                            </a>
                        </div>
                    {% endif %}
                </div>

                <div class="md:hidden">
                    <button class="text-gray-600 focus:outline-none">
                        <i class="fa-solid fa-bars text-xl"></i>
                    </button>
                </div>

            </div>
        </div>
    </nav>

    <main class="flex-grow container mx-auto px-4 sm:px-6 lg:px-8 py-10">
        <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-6 md:p-10">
            {% block content %}{% endblock %}
        </div>
    </main>

    <footer class="bg-white border-t border-gray-200 py-8">
        <div class="max-w-7xl mx-auto px-4 text-center">
            <p class="text-gray-400 text-sm">
                &copy; 2024 PhotoLife Project. Készült ❤️-vel a fotózás szerelmeseinek.
            </p>
        </div>
    </footer>

</body>
</html>
