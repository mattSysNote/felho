<!DOCTYPE html>
<html>
<head>
    <title>PhotoLife</title>
    <style>
        body { font-family: sans-serif; margin: 20px; }
        nav { margin-bottom: 20px; padding: 10px; background: #f4f4f4; }
        .btn { padding: 5px 10px; background: #007bff; color: white; text-decoration: none; border-radius: 4px; }
        .btn-danger { background: #dc3545; }
    </style>
</head>
<body>
    <nav>
        <a href="{% url 'photo_list' %}">Főoldal</a>
        {% if user.is_authenticated %}
            <span>Üdv, {{ user.username }}!</span>
            <a href="{% url 'photo_upload' %}">Feltöltés</a>
            <form action="{% url 'logout' %}" method="post" style="display:inline;">
                {% csrf_token %}
                <button type="submit">Kilépés</button>
            </form>
        {% else %}
            <a href="{% url 'login' %}">Belépés</a>
            <a href="{% url 'register' %}">Regisztráció</a>
        {% endif %}
    </nav>
    <div class="content">
        {% block content %}{% endblock %}
    </div>
</body>
</html>
