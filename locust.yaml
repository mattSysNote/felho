apiVersion: apps/v1
kind: Deployment
metadata:
  name: locust-stress-tester
  labels:
    app: locust-stress-tester
spec:
  replicas: 1
  selector:
    matchLabels:
      app: locust-stress-tester
  template:
    metadata:
      labels:
        app: locust-stress-tester
    spec:
      containers:
      - name: locust
        image: django-backend:latest
        imagePullPolicy: Always
        command: ["locust"]
        args: 
          - "-f"
          - "locustfile.py"
          - "--host=http://django-backend:8080" 
        ports:
        - containerPort: 8089
apiVersion: v1
kind: Service
metadata:
  name: locust-tester-svc
spec:
  selector:
    app: locust-tester
  ports:
    - protocol: TCP
      port: 8089
      targetPort: 8089
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: locust-tester-route
spec:
  to:
    kind: Service
    name: locust-tester-svc
  port:
    targetPort: 8089